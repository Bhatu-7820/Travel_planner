services:
  # ─── BACKEND WEB SERVICE ────────────────────────────────────────────
  - type: web
    name: traveloop-backend
    env: node
    plan: free
    rootDir: traveloop-backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3001
      - key: MONGO_URI
        sync: false # User will provide their MongoDB connection string
      - key: GEMINI_API_KEY
        sync: false # User will provide their Gemini API Key
      - key: DEEPSEEK_API_KEY
        sync: false # User will provide their DeepSeek API Key (Optional)
      - key: GROQ_API_KEY
        sync: false # User will provide their Groq API Key (Optional)
      - key: FIREBASE_PROJECT_ID
        value: travelsoon-d6f26 # Pre-populated from local configuration
      - key: FRONTEND_URL
        sync: false # User will enter their frontend static site URL here after deployment

  # ─── FRONTEND STATIC SITE ───────────────────────────────────────────
  - type: static
    name: traveloop-frontend
    env: static
    rootDir: traveloop-frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false # User will configure this to point to the backend URL (e.g. https://traveloop-backend.onrender.com)
      - key: VITE_FIREBASE_API_KEY
        value: AIzaSyATzKbrKmFBDzGS0l2bTYdI_FBf4kOk1t0
      - key: VITE_FIREBASE_AUTH_DOMAIN
        value: travelsoon-d6f26.firebaseapp.com
      - key: VITE_FIREBASE_PROJECT_ID
        value: travelsoon-d6f26
      - key: VITE_FIREBASE_STORAGE_BUCKET
        value: travelsoon-d6f26.firebasestorage.app
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        value: "853670046177"
      - key: VITE_FIREBASE_APP_ID
        value: 1:853670046177:web:7bdce7f0a86aee97368aa0
      - key: VITE_FIREBASE_MEASUREMENT_ID
        value: G-MV4E20JXB5
